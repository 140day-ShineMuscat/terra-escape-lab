<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>루카와 마르카 : 지구탈출연구실 - Chapter 1</title>

<style>
:root{
  --bg:#0b0b0f;
  --panel:rgba(12,16,28,0.72);
  --border:rgba(42,49,67,0.9);
  --text:#e8f2ff;
  --muted:rgba(232,242,255,0.6);
  --accent:#76d2c8;
  --lock:#ff6b6b;
}

html,body{
  margin:0; padding:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  overflow:hidden;
}

#app{ height:100%; display:flex; flex-direction:column; }

/* ---------- Top Bar ---------- */
.topbar{
  padding:14px 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.back{
  font-size:13px;
  font-weight:800;
  color:var(--accent);
  cursor:pointer;
  user-select:none;
}
.chapterTitle{
  text-align:center;
  flex:1;
  font-weight:900;
}

/* ---------- Stage List ---------- */
.stage-list{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:0 16px;
}

.stage{
  width:min(420px,92vw);
  padding:16px;
  border-radius:18px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  cursor:pointer;
  user-select:none;
  position:relative;
}
.stage:active{ transform:translateY(2px); }
.stage h2{ margin:0; font-size:16px; font-weight:900; }
.stage p{ margin-top:6px; font-size:13px; color:var(--muted); }

.stage.open::after{
  content:"BRIEF";
  position:absolute; right:14px; top:14px;
  font-size:11px; font-weight:900; color:var(--accent);
}

.stage.lock{ opacity:.5; cursor:default; }
.stage.lock::after{
  content:"LOCK";
  position:absolute; right:14px; top:14px;
  font-size:11px; font-weight:900; color:var(--lock);
}

/* ---------- Lock Overlay ---------- */
#lockOverlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  align-items:center; justify-content:center;
  z-index:50;
}
.lockCard{
  width:min(360px,90vw);
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:20px;
  text-align:center;
}
.lockCard h3{ margin:0; font-size:18px; font-weight:900; color:#ff7b7b; }
.lockCard p{ margin-top:10px; font-size:13px; color:var(--muted); }

.footer{
  text-align:center;
  padding:10px 0 14px;
  font-size:11px;
  color:var(--muted);
}
</style>
</head>

<body>
<div id="app">

  <div class="topbar">
    <div class="back" id="btnBack">← CHAPTER</div>
    <div class="chapterTitle">1장. 집</div>
    <div class="back" id="btnHome">🏠 HOME</div>
  </div>

  <div class="stage-list">
    <div class="stage open" data-stage="1">
      <h2>Stage 1 · 탈출 실험</h2>
      <p>감시 로봇을 제거하고 안전한 탈출로를 확보하라</p>
    </div>

    <div class="stage open" data-stage="2">
      <h2>Stage 2 · 참치캔 찾기</h2>
      <p>지뢰(감시)를 피해 숨겨진 참치캔을 찾아라</p>
    </div>

    <div class="stage lock" data-stage="3">
      <h2>Stage 3 · 벽돌 실험</h2>
      <p>장애물을 제거하고 길을 만들어라</p>
    </div>

    <div class="stage lock" data-stage="4">
      <h2>Stage 4 · 굴뚝 탈출</h2>
      <p>굴뚝 내부를 올라 집 밖으로 탈출하라</p>
    </div>
  </div>

  <div class="footer">TERRA ESCAPE LAB · CHAPTER 1</div>
</div>

<div id="lockOverlay">
  <div class="lockCard">
    <h3>🔒 실험 미개방</h3>
    <p>이 스테이지는 아직 연구 중입니다.</p>
  </div>
</div>

<script>
const lockOverlay = document.getElementById("lockOverlay");

document.getElementById("btnBack").onclick = () => location.href="index.html";
document.getElementById("btnHome").onclick = () => location.href="index.html";

function goBrief(stageNum){
  // ✅ 스테이지별 브리핑 페이지 연결
  const map = {
    "1": "stage1_mission.html",
    "2": "stage2_mission.html"
    // "3": "stage3_mission.html",
    // "4": "stage4_mission.html",
  };
  const url = map[String(stageNum)];
  if (url) location.href = url;
}

document.querySelectorAll(".stage").forEach(st=>{
  st.onclick = ()=>{
    const num = st.dataset.stage;

    if(st.classList.contains("open")){
      goBrief(num); // ✅ stage1 + stage2 모두 동작
      return;
    }

    // lock
    lockOverlay.style.display="flex";
  };
});

lockOverlay.onclick = ()=> lockOverlay.style.display="none";
</script>
</body>
</html>
