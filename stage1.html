<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>루카와 마르카 : 지구탈출연구실 - STAGE 1</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    touch-action: none;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  canvas { position:absolute; inset:0; width:100vw; height:100vh; }

  /* ===== Bottom Buttons ===== */
  .topbar{
    position:absolute;
    left:10px; right:10px;
    bottom:max(10px, env(safe-area-inset-bottom));
    top:auto;
    display:flex;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
    z-index:30;
  }
  .btn{
    pointer-events:auto;
    flex:1;
    text-align:center;
    padding:10px 12px;
    border-radius:14px;
    background: rgba(12,16,28,0.70);
    border:1px solid rgba(42,49,67,0.9);
    color:#e8f2ff;
    font-weight:900;
    font-size:12px;
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  .btn:active{ transform: translateY(1px); }

  /* ===== Start Layer ===== */
  .startLayer{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.45);
    z-index:20;
    touch-action:none;
  }
  .card{
    width:min(420px, 92vw);
    background: rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:18px 16px;
    color:#e8f2ff;
    text-align:center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .card .t{ font-weight:950; font-size:18px; margin-bottom:8px; }
  .card .s{ font-size:13px; opacity:0.85; line-height:1.35; }
  .card .logo{ margin-top:10px; font-weight:900; letter-spacing:1px; color:#76d2c8; font-size:13px; }

  /* ===== Result Overlay (Stats + Name) ===== */
  #resultOverlay{
    position:fixed; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.60);
    z-index:9999;
    touch-action:none;
    padding: 18px 0;
  }
  #resultOverlay .card{
    width:min(460px, 92vw);
    background: rgba(12,16,28,0.78);
    border:1px solid rgba(42,49,67,0.95);
    border-radius:18px;
    padding:18px 16px;
    color:#e8f2ff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align:center;

    /* ✅ 모바일에서 아래가 잘리면 스크롤 */
    max-height: 86vh;
    overflow:auto;
    -webkit-overflow-scrolling: touch;
  }
  #resultOverlay .title{
    font-size:18px; font-weight:950;
    margin:0 0 6px 0;
  }
  #resultOverlay .sub{
    font-size:12px; opacity:0.8;
    margin:0 0 14px 0;
  }
  #resultOverlay .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:10px 0 14px;
  }
  #resultOverlay .stat{
    background: rgba(0,0,0,0.28);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    padding:10px 10px;
  }
  #resultOverlay .k{ font-size:11px; opacity:0.75; }
  #resultOverlay .v{ font-size:16px; font-weight:950; margin-top:4px; }

  #resultOverlay .btnRow{
    display:flex; gap:10px;
    margin-top:10px;
  }
  #resultOverlay .btn{
    flex:1;
    padding:12px 10px;
    border-radius:16px;
    font-weight:950;
    background: rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.14);
    user-select:none;
  }
  #resultOverlay .btn:active{ transform: translateY(2px); }
  #resultOverlay .btn.primary{
    background: rgba(118,210,200,0.18);
    border-color: rgba(118,210,200,0.55);
  }
  #resultOverlay .btn.danger{
    background: rgba(255,107,107,0.16);
    border-color: rgba(255,107,107,0.45);
  }

  /* ✅ 입력칸이 확실히 보이도록 */
  #rankNameInput{
    width:100%;
    box-sizing:border-box;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background: rgba(0,0,0,0.25);
    color:#e8f2ff;
    outline:none;
    font-weight:900;
    font-size:14px;
  }
</style>
</head>

<body>
  <!-- ✅ resultOverlay는 1개만 -->
  <div id="resultOverlay"></div>

  <canvas id="game"></canvas>

  <div class="topbar">
    <div class="btn" id="btnSwap">SWAP (루카/마르카)</div>
    <div class="btn" id="btnBgm">BGM: ON</div>
    <div class="btn" id="btnRestart">RESTART</div>
  </div>

  <div class="startLayer" id="startLayer">
    <div class="card">
      <div class="t">루카와 마르카 : 지구탈출연구실</div>
      <div class="s">STAGE 1 · 세로 슈팅<br/>드래그 이동 · 자동 발사</div>
      <div class="logo">TERRA ESCAPE LAB</div>
    </div>
  </div>

  <!-- ✅ 스크립트는 딱 2개만, 순서 고정 -->
<script src="js/engine.js?v=1"></script>
<script src="js/rank.js?v=1"></script>
<script src="js/result_modal.js?v=1"></script>
<script src="js/stage1.js?v=1"></script>
<script>
  TEL.start(window.Stage1);
</script>
</body>
</html>
