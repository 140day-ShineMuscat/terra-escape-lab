<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>루카와 마르카 : 지구탈출연구실 - STAGE 1</title>

<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    touch-action: none;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  canvas { position:absolute; inset:0; width:100vw; height:100vh; }

  /* ===== Bottom buttons (swap/bgm/restart) ===== */
  .topbar{
    position:fixed;
    left:10px; right:10px;
    bottom:max(10px, env(safe-area-inset-bottom));
    display:flex;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
    z-index:30;
  }
  .btn{
    pointer-events:auto;
    flex:1;
    text-align:center;
    padding:10px 12px;
    border-radius:14px;
    background: rgba(12,16,28,0.70);
    border:1px solid rgba(42,49,67,0.9);
    color:#e8f2ff;
    font-weight:900;
    font-size:12px;
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  .btn:active{ transform: translateY(1px); }

  /* ===== Start overlay ===== */
  .startLayer{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.45);
    z-index:20;
    touch-action:none;
  }
  .startLayer .card{
    width:min(420px, 92vw);
    background: rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:18px 16px;
    color:#e8f2ff;
    text-align:center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .startLayer .t{ font-weight:950; font-size:18px; margin-bottom:8px; }
  .startLayer .s{ font-size:13px; opacity:0.85; line-height:1.35; }
  .startLayer .logo{ margin-top:10px; font-weight:900; letter-spacing:1px; color:#76d2c8; font-size:13px; }

  /* ===== Result overlay (stats) ===== */
  #resultOverlay{
    position:fixed; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.60);
    z-index:9999;
    touch-action:none;
  }
  #resultOverlay .card{
    width:min(460px, 92vw);
    background: rgba(12,16,28,0.78);
    border:1px solid rgba(42,49,67,0.95);
    border-radius:18px;
    padding:18px 16px;
    color:#e8f2ff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align:center;
  }
  #resultOverlay .title{
    font-size:18px; font-weight:950;
    margin:0 0 6px 0;
  }
  #resultOverlay .sub{
    font-size:12px; opacity:0.8;
    margin:0 0 14px 0;
  }
  #resultOverlay .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:10px 0 14px;
  }
  #resultOverlay .stat{
    background: rgba(0,0,0,0.28);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    padding:10px 10px;
  }
  #resultOverlay .k{ font-size:11px; opacity:0.75; }
  #resultOverlay .v{ font-size:16px; font-weight:950; margin-top:4px; }
  #resultOverlay .btnRow{
    display:flex; gap:10px;
    margin-top:10px;
  }
  #resultOverlay .btn{
    flex:1;
    padding:12px 10px;
    border-radius:16px;
    font-weight:950;
    background: rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.14);
    color:#e8f2ff;
    user-select:none;
  }
  #resultOverlay .btn:active{ transform: translateY(2px); }
  #resultOverlay .btn.primary{
    background: rgba(118,210,200,0.18);
    border-color: rgba(118,210,200,0.55);
  }
  #resultOverlay .btn.danger{
    background: rgba(255,107,107,0.16);
    border-color: rgba(255,107,107,0.45);
  }
</style>
</head>

<body>
  <!-- ✅ 통계/결과 오버레이 (딱 1개만) -->
  <div id="resultOverlay"></div>

  <canvas id="game"></canvas>

  <!-- ✅ 하단 버튼 3개 -->
  <div class="topbar">
    <div class="btn" id="btnSwap">SWAP (루카/마르카)</div>
    <div class="btn" id="btnBgm">BGM: ON</div>
    <div class="btn" id="btnRestart">RESTART</div>
  </div>

  <!-- ✅ 시작 오버레이 -->
  <div class="startLayer" id="startLayer">
    <div class="card">
      <div class="t">루카와 마르카 : 지구탈출연구실</div>
      <div class="s">STAGE 1 · 세로 슈팅 데모<br/>드래그 이동 · 자동 발사</div>
      <div class="logo">TERRA ESCAPE LAB</div>
    </div>
  </div>

  <!-- ✅ 스크립트 로드 순서 중요: engine → stage → start -->
  <script src="js/engine.js"></script>
  <script src="js/stage1.js"></script>
  <script>
    // engine.js가 window.TEL을 만들고,
    // stage1.js가 window.Stage1을 만든 뒤 여기서 시작
    TEL.start(Stage1);

    // ✅ 빠른 진단용(원하면 지워도 됨):
    // 콘솔에서 Stage1_showResult(...) 테스트 가능
    // Stage1_showResult({success:true, score:1234, timeSec:67, maxWeaponLv:4});
  </script>
</body>
</html>
