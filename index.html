<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>루카와 마르카 : 지구탈출연구실</title>

<style>
:root{
  --bg:#070a12;
  --card:#0c101c;
  --line:rgba(255,255,255,0.12);
  --accent:#76d2c8;
  --text:#e8f2ff;
  --muted:rgba(232,242,255,0.65);
}

*{ box-sizing:border-box; }
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

body{
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  min-height:100vh;
  padding:14px 14px 28px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:18px;
}

.titleBox{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  border-radius:18px;
  background:rgba(12,16,28,0.7);
  border:1px solid var(--line);
}

.logo{
  width:48px;
  height:48px;
  border-radius:14px;
  background:#111;
  object-fit:contain;
}

.titleText{
  display:flex;
  flex-direction:column;
}

.titleMain{
  font-size:18px;
  font-weight:950;
  line-height:1.1;
}

.titleSub{
  font-size:11px;
  letter-spacing:1.4px;
  opacity:0.75;
}

/* header buttons */
.headerBtns{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px 10px;
  border-radius:16px;
  font-weight:900;
  font-size:13px;
  border:1px solid var(--line);
  background:rgba(12,16,28,0.6);
  color:var(--text);
}

.btn:active{ transform:translateY(1px); }

.btn.accent{
  background:rgba(118,210,200,0.18);
  border-color:rgba(118,210,200,0.55);
}

/* ===== SECTION ===== */
.sectionTitle{
  font-size:13px;
  font-weight:900;
  letter-spacing:1px;
  opacity:0.7;
  margin:6px 4px 12px;
}

/* ===== CHAPTER CARD ===== */
.chapter{
  background:linear-gradient(135deg, rgba(30,60,70,0.25), rgba(10,12,22,0.9));
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px 16px;
  margin-bottom:16px;
}

.chapter.locked{
  opacity:0.55;
}

.chapterHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.chapterTitle{
  font-size:20px;
  font-weight:950;
}

.badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:rgba(0,0,0,0.35);
  border:1px solid var(--line);
}

.badge.ready{
  background:rgba(118,210,200,0.18);
  border-color:rgba(118,210,200,0.55);
  color:#bff5ee;
}

.badge.lock{
  opacity:0.8;
}

.chapterDesc{
  font-size:14px;
  line-height:1.4;
  color:var(--muted);
  margin-bottom:6px;
}

.chapterSub{
  font-size:13px;
  opacity:0.7;
  margin-bottom:14px;
}

.chapterBtn{
  width:100%;
  padding:14px;
  border-radius:18px;
  font-size:15px;
  font-weight:950;
  border:1px solid var(--line);
  background:rgba(12,16,28,0.6);
  color:var(--text);
}

.chapterBtn.enter{
  background:rgba(118,210,200,0.18);
  border-color:rgba(118,210,200,0.55);
}

.chapterBtn.locked{
  opacity:0.6;
}
</style>
</head>

<body>
<div class="app">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="titleBox">
      <img src="assets/logo.png" class="logo" alt="Terra Escape Lab" />
      <div class="titleText">
        <div class="titleMain">루카와 마르카</div>
        <div class="titleSub">TERRA ESCAPE LAB</div>
      </div>
    </div>

    <div class="headerBtns">
      <button class="btn accent" onclick="location.href='rank.html'">🏆 RANKING</button>
      <button class="btn" onclick="resetConfirm()">🧹 RESET</button>
    </div>
  </div>

  <!-- ===== CHAPTER SELECT ===== -->
  <div class="sectionTitle">CHAPTER SELECT</div>

  <!-- Chapter 1 -->
  <div class="chapter">
    <div class="chapterHeader">
      <div class="chapterTitle">1장. 집</div>
      <div class="badge ready">READY</div>
    </div>
    <div class="chapterDesc">탈출! 인간의 집</div>
    <div class="chapterSub">Stage 1 ~ 4</div>
    <button class="chapterBtn enter"
      onclick="location.href='stage_select_ch1.html'">
      ENTER
    </button>
  </div>

  <!-- Chapter 2 -->
  <div class="chapter locked">
    <div class="chapterHeader">
      <div class="chapterTitle">2장. 지구</div>
      <div class="badge lock">LOCK</div>
    </div>
    <div class="chapterDesc">우주 로켓 탈취 대작전!</div>
    <div class="chapterSub">준비중</div>
    <button class="chapterBtn locked" disabled>
      LOCKED
    </button>
  </div>

  <!-- Chapter 3 -->
  <div class="chapter locked">
    <div class="chapterHeader">
      <div class="chapterTitle">3장. 우주</div>
      <div class="badge lock">LOCK</div>
    </div>
    <div class="chapterDesc">가자! 달과 화성으로</div>
    <div class="chapterSub">준비중</div>
    <button class="chapterBtn locked" disabled>
      LOCKED
    </button>
  </div>

</div>

<script>
function resetConfirm(){
  if (!confirm("모든 랭킹 데이터를 초기화할까요?")) return;
  localStorage.removeItem("TEL_RANK_GLOBAL");
  localStorage.removeItem("TEL_RANK_STAGE");
  alert("랭킹 데이터가 초기화되었습니다.");
}
</script>

</body>
</html>
