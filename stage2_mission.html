<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Stage 1 Mission - 루카와 마르카 : 지구탈출연구실</title>

<style>
:root{
  --bg:#0b0b0f;
  --panel:rgba(12,16,28,0.72);
  --border:rgba(42,49,67,0.9);
  --text:#e8f2ff;
  --muted:rgba(232,242,255,0.7);
  --accent:#76d2c8;
  --danger:#ff6b6b;
}

html,body{
  margin:0; padding:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  overflow:hidden;
}

.wrap{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
  gap:14px;
}

.card{
  width:min(520px, 92vw);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.hd{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.hd .title{
  font-weight:950;
  font-size:16px;
}
.hd .tag{
  font-weight:900;
  font-size:11px;
  color:var(--accent);
}

.img{
  width:100%;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.10);
}
.img img{
  width:100%;
  height:auto;
  display:block;
}

.desc{
  margin-top:12px;
  font-size:14px;
  line-height:1.55;
  color:var(--muted);
}

.btnRow{
  width:min(520px, 92vw);
  display:flex;
  gap:12px;
}
.btn{
  flex:1;
  text-align:center;
  padding:14px 12px;
  border-radius:16px;
  background:rgba(12,16,28,0.80);
  border:1px solid rgba(42,49,67,0.95);
  font-weight:950;
  user-select:none;
  cursor:pointer;
}
.btn:active{ transform:translateY(2px); }

.btn.start{
  background:rgba(118,210,200,0.18);
  border-color:rgba(118,210,200,0.55);
  color:rgba(232,242,255,0.95);
}
.btn.back{
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.16);
  color:rgba(232,242,255,0.88);
}

.foot{
  margin-top:6px;
  font-size:11px;
  color:rgba(232,242,255,0.45);
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="hd">
      <div class="title">Stage 2 · 미션 브리핑</div>
      <div class="tag">CHAPTER 1 : HOUSE</div>
    </div>

    <div class="img">
      <img src="assets/plan2.png" alt="Stage 1 Mission Plan">
    </div>

    <div class="desc">
       인간이 보낸 감시로봇은 제거되었고, 이제 탈출 전 충분한 식량확보가 필요하다. 
        <br/><br/>
        <b>목표:</b> 인간이 숨겨놓은 <b>참치캔</b>을 찾아라.
    </div>
  </div>

  <div class="btnRow">
    <div class="btn back" id="btnBack">← 돌아가기</div>
    <div class="btn start" id="btnStart">START ▶</div>
  </div>

  <div class="foot">TERRA ESCAPE LAB · MISSION BRIEFING</div>
</div>

<script>
document.getElementById("btnBack").onclick = () => {
  location.href = "stage_select_ch1.html";
};
document.getElementById("btnStart").onclick = () => {
  location.href = "stage2.html";
};
</script>
</body>
</html>
