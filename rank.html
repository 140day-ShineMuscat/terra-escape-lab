<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>루카와 마르카 : 지구탈출연구실 - RANKING</title>
  <style>
    :root{
      --bg:#070a12;
      --panel:rgba(12,16,28,0.78);
      --line:rgba(42,49,67,0.95);
      --text:#e8f2ff;
      --muted:rgba(232,242,255,0.75);
      --accent:rgba(118,210,200,0.85);
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(900px 700px at 50% 15%, rgba(30,40,80,0.35), transparent 60%),
        radial-gradient(700px 600px at 50% 110%, rgba(20,80,70,0.22), transparent 60%),
        var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px 14px 26px;
    }
    .card{
      width:min(420px, 94vw);
      background: rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:22px;
      padding:16px 14px 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 55px rgba(0,0,0,0.55);
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .title{
      font-weight:950;
      font-size:16px;
      line-height:1.1;
    }
    .sub{
      margin-top:4px;
      font-size:11px;
      color:var(--muted);
      letter-spacing:0.6px;
    }

    .btn{
      user-select:none;
      -webkit-user-select:none;
      cursor:pointer;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(12,16,28,0.70);
      color:var(--text);
      font-weight:950;
      font-size:12px;
      padding:10px 12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition: transform 0.06s ease;
      white-space:nowrap;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: rgba(118,210,200,0.55);
      background: rgba(118,210,200,0.14);
    }
    .btn.ghost{
      border-color: rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
    }

    .controls{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:10px 0 12px;
    }

    .tabs{
      display:flex;
      gap:10px;
    }
    .tab{
      flex:1;
      text-align:center;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      font-weight:950;
      font-size:12px;
      cursor:pointer;
      user-select:none;
    }
    .tab.active{
      border-color: rgba(118,210,200,0.55);
      background: rgba(118,210,200,0.14);
      color: rgba(166,255,176,0.95);
    }

    select{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.25);
      color:var(--text);
      outline:none;
      font-weight:900;
      font-size:13px;
      appearance:none;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }
    .row{
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(12,16,28,0.55);
      padding:12px 12px;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .rank{
      width:44px;
      height:44px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      flex:0 0 auto;
    }
    .rank.top1{ border-color: rgba(255,215,0,0.55); background: rgba(255,215,0,0.10); }
    .rank.top2{ border-color: rgba(200,200,200,0.55); background: rgba(200,200,200,0.10); }
    .rank.top3{ border-color: rgba(205,127,50,0.55); background: rgba(205,127,50,0.10); }

    .main{
      flex:1;
      min-width:0;
    }
    .nameLine{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:baseline;
    }
    .name{
      font-weight:950;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .score{
      font-weight:950;
      font-size:14px;
      color: rgba(166,255,176,0.95);
      flex:0 0 auto;
    }
    .meta{
      margin-top:5px;
      font-size:11px;
      color:var(--muted);
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .chip{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
    }

    .empty{
      margin-top:10px;
      padding:14px 12px;
      border-radius:18px;
      border:1px dashed rgba(255,255,255,0.20);
      color: rgba(232,242,255,0.82);
      background: rgba(0,0,0,0.18);
      font-size:13px;
      line-height:1.35;
    }

    .footer{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,0.10);
      color:var(--muted);
      font-size:11px;
      letter-spacing:0.4px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="title">🏆 RANKING</div>
          <div class="sub">LOCAL (localStorage) · GLOBAL / STAGE</div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="btn ghost" id="btnHome">HOME</div>
          <div class="btn primary" id="btnClear">RESET</div>
        </div>
      </div>

      <div class="controls">
        <div class="tabs">
          <div class="tab active" id="tabGlobal">GLOBAL</div>
          <div class="tab" id="tabStage">STAGE</div>
        </div>

        <div id="stagePickerWrap" style="display:none;">
          <select id="stagePicker"></select>
        </div>
      </div>

      <div id="list" class="list"></div>
      <div id="empty" class="empty" style="display:none;"></div>

      <div class="footer">
        <div>표시: 상위 10개</div>
        <div id="modeText">MODE: GLOBAL</div>
      </div>
    </div>
  </div>

  <script>
    const KEY_GLOBAL = "TEL_RANK_GLOBAL";
    const KEY_STAGE  = "TEL_RANK_STAGE";

    const $ = (id)=>document.getElementById(id);

    function loadJSON(key, fallback){
      try{
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      }catch(e){
        return fallback;
      }
    }

    function fmtTime(sec){
      sec = Math.max(0, Math.floor(sec || 0));
      const m = String(Math.floor(sec/60)).padStart(2,"0");
      const s = String(sec%60).padStart(2,"0");
      return `${m}:${s}`;
    }

    function rankClass(i){
      if (i===0) return "top1";
      if (i===1) return "top2";
      if (i===2) return "top3";
      return "";
    }

    function buildStageOptions(stageObj){
      const ids = Object.keys(stageObj || {}).sort();
      // 기본 제공(없으면)
      const defaults = ["1-1","1-2","1-3","1-4"];
      for (const d of defaults) if (!ids.includes(d)) ids.push(d);

      $("stagePicker").innerHTML = ids.map(id => `<option value="${id}">${id}</option>`).join("");
    }

    function renderList(entries, modeLabel){
      const listEl = $("list");
      const emptyEl = $("empty");
      listEl.innerHTML = "";
      emptyEl.style.display = "none";

      if (!entries || entries.length === 0){
        emptyEl.style.display = "block";
        emptyEl.innerHTML = `
          아직 기록이 없어.<br/>
          Stage 1 플레이 후 결과 화면에서 <b>SAVE RANK</b> 눌러줘!
        `;
        $("modeText").textContent = "MODE: " + modeLabel;
        return;
      }

      for (let i=0;i<entries.length;i++){
        const e = entries[i] || {};
        const div = document.createElement("div");
        div.className = "row";
        div.innerHTML = `
          <div class="rank ${rankClass(i)}">${i+1}</div>
          <div class="main">
            <div class="nameLine">
              <div class="name">${(e.name || "NONAME")}</div>
              <div class="score">${Math.floor(e.score||0)}</div>
            </div>
            <div class="meta">
              <span class="chip">TIME ${fmtTime(e.timeSec||0)}</span>
              <span class="chip">LV ${Math.floor(e.maxWeaponLv||1)}</span>
              <span class="chip">STAGE ${(e.stage || "-")}</span>
              <span class="chip">${e.date || ""}</span>
            </div>
          </div>
        `;
        listEl.appendChild(div);
      }

      $("modeText").textContent = "MODE: " + modeLabel;
    }

    // ===== state =====
    let mode = "GLOBAL"; // or "STAGE"
    let stageId = "1-1";

    function refresh(){
      const g = loadJSON(KEY_GLOBAL, []);
      const sObj = loadJSON(KEY_STAGE, {});
      buildStageOptions(sObj);

      if (mode === "GLOBAL"){
        $("stagePickerWrap").style.display = "none";
        renderList(g, "GLOBAL");
      } else {
        $("stagePickerWrap").style.display = "block";
        const arr = Array.isArray(sObj[stageId]) ? sObj[stageId] : [];
        renderList(arr, `STAGE ${stageId}`);
      }
    }

    // ===== events =====
    $("btnHome").onclick = () => location.href = "index.html";

    // reset (confirm)
    let armed = false;
    $("btnClear").onclick = () => {
      if (!armed){
        armed = true;
        $("btnClear").textContent = "CONFIRM";
        $("btnClear").style.borderColor = "rgba(255,107,107,0.55)";
        $("btnClear").style.background = "rgba(255,107,107,0.12)";
        setTimeout(()=>{
          armed = false;
          $("btnClear").textContent = "RESET";
          $("btnClear").style.borderColor = "";
          $("btnClear").style.background = "";
        }, 2200);
        return;
      }
      try{
        localStorage.removeItem(KEY_GLOBAL);
        localStorage.removeItem(KEY_STAGE);
      }catch(e){}
      alert("랭킹 데이터 초기화 완료!");
      armed = false;
      $("btnClear").textContent = "RESET";
      $("btnClear").style.borderColor = "";
      $("btnClear").style.background = "";
      refresh();
    };

    $("tabGlobal").onclick = () => {
      mode = "GLOBAL";
      $("tabGlobal").classList.add("active");
      $("tabStage").classList.remove("active");
      refresh();
    };

    $("tabStage").onclick = () => {
      mode = "STAGE";
      $("tabStage").classList.add("active");
      $("tabGlobal").classList.remove("active");
      refresh();
    };

    $("stagePicker").onchange = (e) => {
      stageId = e.target.value;
      refresh();
    };

    // init
    refresh();
  </script>
</body>
</html>
